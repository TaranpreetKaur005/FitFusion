<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitFusion – Admin DB Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Poppins, sans-serif;
      background: #0f0f13;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: #1a1a24;
      border-bottom: 1px solid #2d2d3d;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .admin-logo {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(90deg, #7c3aed, #ec4899);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .status-dot {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #888;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      transition: background 0.3s;
    }

    .dot.online { background: #10b981; box-shadow: 0 0 6px #10b981; }

    /* MAIN */
    main { padding: 32px; max-width: 1100px; margin: auto; }

    /* STATS ROW */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: #1a1a24;
      border: 1px solid #2d2d3d;
      border-radius: 14px;
      padding: 20px 24px;
    }

    .stat-card .label { font-size: 12px; color: #888; margin-bottom: 6px; }
    .stat-card .value { font-size: 28px; font-weight: 700; color: #fff; }
    .stat-card .sub   { font-size: 11px; color: #555; margin-top: 4px; }

    /* TOOLBAR */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .toolbar h2 { font-size: 16px; font-weight: 600; }

    .toolbar-right { display: flex; gap: 10px; align-items: center; }

    input[type="search"] {
      background: #1a1a24;
      border: 1px solid #2d2d3d;
      border-radius: 10px;
      padding: 8px 14px;
      color: #e2e8f0;
      font-family: Poppins, sans-serif;
      font-size: 13px;
      outline: none;
      width: 220px;
      transition: border-color 0.2s;
    }

    input[type="search"]:focus { border-color: #7c3aed; }

    .btn-refresh {
      background: linear-gradient(90deg, #7c3aed, #ec4899);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 8px 18px;
      font-family: Poppins, sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-refresh:hover { opacity: 0.85; }

    /* TABLE */
    .table-wrap {
      background: #1a1a24;
      border: 1px solid #2d2d3d;
      border-radius: 16px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead {
      background: #13131c;
      border-bottom: 1px solid #2d2d3d;
    }

    th {
      padding: 13px 18px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    td {
      padding: 13px 18px;
      border-bottom: 1px solid #1e1e2a;
      color: #ccc;
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }

    tr:hover td { background: rgba(124,58,237,0.05); }

    .badge-id {
      background: rgba(124,58,237,0.15);
      color: #a78bfa;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 600;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: white;
      flex-shrink: 0;
    }

    .user-cell { display: flex; align-items: center; gap: 10px; }

    .btn-delete {
      background: rgba(239,68,68,0.1);
      color: #ef4444;
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      font-family: Poppins, sans-serif;
      transition: background 0.2s;
    }

    .btn-delete:hover { background: rgba(239,68,68,0.2); }

    /* EMPTY / LOADING */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #555;
      font-size: 14px;
    }

    .empty span { font-size: 36px; display: block; margin-bottom: 12px; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: #1a1a24;
      border: 1px solid #2d2d3d;
      color: #e2e8f0;
      padding: 10px 22px;
      border-radius: 50px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 999;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.ok   { border-color: #10b981; color: #10b981; }
    .toast.err  { border-color: #ef4444; color: #ef4444; }
  </style>
</head>
<body>

<header>
  <span class="admin-logo">🔥 FitFusion — Admin DB Viewer</span>
  <div class="status-dot">
    <div class="dot" id="dot"></div>
    <span id="status-text">Connecting…</span>
  </div>
</header>

<main>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-card">
      <div class="label">Total Users</div>
      <div class="value" id="stat-total">—</div>
      <div class="sub">registered accounts</div>
    </div>
    <div class="stat-card">
      <div class="label">Database</div>
      <div class="value" style="font-size:18px;margin-top:4px">fitfusion.db</div>
      <div class="sub">SQLite · localhost:3001</div>
    </div>
    <div class="stat-card">
      <div class="label">Last Refreshed</div>
      <div class="value" style="font-size:16px;margin-top:4px" id="stat-time">—</div>
      <div class="sub">auto-refreshes every 10s</div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="toolbar">
    <h2>Users Table</h2>
    <div class="toolbar-right">
      <input type="search" id="search" placeholder="Search by name or email…">
      <button class="btn-refresh" onclick="loadUsers()">↻ Refresh</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>User</th>
          <th>Email</th>
          <th>Registered</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="5" class="empty"><span>⏳</span>Loading…</td></tr>
      </tbody>
    </table>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
  const API = 'http://localhost:3001/api';
  let allUsers = [];

  const dot        = document.getElementById('dot');
  const statusText = document.getElementById('status-text');
  const statTotal  = document.getElementById('stat-total');
  const statTime   = document.getElementById('stat-time');
  const tbody      = document.getElementById('tbody');
  const searchEl   = document.getElementById('search');
  const toastEl    = document.getElementById('toast');

  let toastTimer;
  function showToast(msg, type = '') {
    clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.className = `toast ${type} show`;
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3000);
  }

  function initials(f, l) {
    return ((f?.[0] || '') + (l?.[0] || '')).toUpperCase();
  }

  function formatDate(str) {
    if (!str) return '—';
    return new Date(str).toLocaleString();
  }

  function renderTable(users) {
    if (!users.length) {
      tbody.innerHTML = `<tr><td colspan="5" class="empty"><span>📭</span>No users found.</td></tr>`;
      return;
    }
    tbody.innerHTML = users.map(u => `
      <tr>
        <td><span class="badge-id">#${u.id}</span></td>
        <td>
          <div class="user-cell">
            <div class="avatar">${initials(u.first_name, u.last_name)}</div>
            ${u.first_name} ${u.last_name}
          </div>
        </td>
        <td>${u.email}</td>
        <td>${formatDate(u.created_at)}</td>
        <td><button class="btn-delete" onclick="deleteUser(${u.id}, '${u.email}')">Delete</button></td>
      </tr>
    `).join('');
  }

  async function loadUsers() {
    try {
      const res  = await fetch(`${API}/users`);
      const data = await res.json();
      allUsers = data.users || [];
      statTotal.textContent = data.count;
      statTime.textContent  = new Date().toLocaleTimeString();
      dot.classList.add('online');
      statusText.textContent = 'Server online';
      renderTable(allUsers);
    } catch {
      dot.classList.remove('online');
      statusText.textContent = 'Server offline';
      tbody.innerHTML = `<tr><td colspan="5" class="empty"><span>🔴</span>Cannot reach server.<br>Run: <code>cd server && npm start</code></td></tr>`;
    }
  }

  async function deleteUser(id, email) {
    if (!confirm(`Delete user "${email}"?`)) return;
    try {
      const res = await fetch(`${API}/users/${id}`, { method: 'DELETE' });
      if (res.ok) {
        showToast(`Deleted ${email}`, 'ok');
        loadUsers();
      } else {
        showToast('Delete failed.', 'err');
      }
    } catch {
      showToast('Server error.', 'err');
    }
  }

  // Live search filter
  searchEl.addEventListener('input', () => {
    const q = searchEl.value.toLowerCase();
    renderTable(allUsers.filter(u =>
      `${u.first_name} ${u.last_name} ${u.email}`.toLowerCase().includes(q)
    ));
  });

  // Initial load + auto-refresh every 10s
  loadUsers();
  setInterval(loadUsers, 10000);
</script>
</body>
</html>
